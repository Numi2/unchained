# unchained Configuration File

[net]
# Port to listen on for P2P connections
listen_port = 31000
peer_exchange = true


# Maximum number of peer connections (prevents resource exhaustion)
max_peers = 133337

# Connection timeout in seconds
connection_timeout_secs = 300

# Timeout for initial network sync in seconds
sync_timeout_secs = 1800

# The public IP address of this node, to be announced to other peers.
# This is essential for nodes running behind a NAT.

# Bootstrap nodes to connect to.
# Each entry must be a signed NodeRecordV2 compact string or a path to a file containing one.
bootstrap = []

# Optional signed trust-update documents for revocation/replacement of node roots.
# Each entry must be a TrustUpdateV1 compact string or a path to a file containing one.
trust_updates = []


[p2p]
# Peer scoring and rate limiting constants
max_validation_failures_per_peer = 10000
peer_ban_duration_secs = 3600 # 1 hour
rate_limit_window_secs = 600
max_messages_per_window = 1000

[storage]
# rebuilding the app every time the node writes to its database.
path = "../blockchain_data"

[epoch]
# Local checkpoint cadence in seconds for a standalone validator/runtime.
# Finalized slot/epoch consensus state is protocol-defined, not operator-tuned.
seconds = 222

[metrics]
# Optional local observability endpoint. Must remain loopback-only.
bind = "127.0.0.1:9100"

[orphan]
total_cap = 32768
per_height_cap = 64
ttl_secs = 300
height_cooldown_secs = 1
